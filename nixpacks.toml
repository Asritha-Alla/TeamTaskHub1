[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
cmds = ["npm install -g pnpm@9.15.9"]

[phases.install]
cmds = ["npm install -g corepack@latest && corepack prepare pnpm@9.15.9 --activate && pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "BASE_PATH=/ PORT=3000 pnpm --filter @workspace/task-app run build",
  "pnpm --filter @workspace/api-server run build",
]
